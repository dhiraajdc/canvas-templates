<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08080B;font-family:sans-serif;color:#fff}
:root{--s:#0D0E14;--b:#1A1B24;--b2:#24263200;--tx:#E8E9F0;--mt2:#6A6C80;--ac:#6B3CF7;--ac-glow:rgba(107,60,247,0.25)}

.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s);border-radius:20px 20px 0 0;max-height:92vh;display:flex;flex-direction:column}
.handle{padding:12px 0 4px;display:flex;justify-content:center;flex-shrink:0}
.handle-bar{width:36px;height:4px;border-radius:2px;background:var(--b)}
.header{padding:4px 20px 14px;flex-shrink:0;border-bottom:1px solid var(--b)}
.body{flex:1;overflow-y:auto;padding:16px 16px 0;-webkit-overflow-scrolling:touch}
.footer{padding:12px 16px;border-top:1px solid var(--b);flex-shrink:0}
.btn{width:100%;padding:14px;border-radius:50px;background:var(--ac);border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.item{padding:12px;background:#12131A;border:1.5px solid var(--b);border-radius:10px;margin-bottom:8px}
</style>
</head>
<body>
<div class="sheet">
  <div class="handle"><div class="handle-bar"></div></div>
  <div class="header"><div style="font-size:16px;font-weight:600">What to post about?</div></div>
  <div class="body">
    <div class="item">Topic 1 - some text here</div>
    <div class="item">Topic 2 - some text here</div>
    <div class="item">Topic 3 - some text here</div>
    <div style="display:flex;align-items:center;gap:10px;margin:8px 0">
      <div style="flex:1;height:1px;background:var(--b)"></div>
      <div style="font-size:11px;color:var(--mt2)">or write your own</div>
      <div style="flex:1;height:1px;background:var(--b)"></div>
    </div>
    <input type="text" placeholder="Type your topic..." style="width:100%;background:#12131A;border:1.5px solid var(--b);border-radius:10px;padding:11px 14px;color:#fff;font-size:13px;outline:none">
  </div>
  <div class="footer">
    <button class="btn">Continue →</button>
  </div>
</div>
</body>
</html>
