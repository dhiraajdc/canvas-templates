<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Day Chart — Live Preview</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#030508;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;font-family:"DM Sans",sans-serif;gap:16px}
.player-wrap{width:100%;max-width:400px;border-radius:16px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.8)}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
button{padding:8px 18px;border-radius:8px;border:1px solid #222;background:#111;color:#aaa;font-size:12px;font-family:"DM Mono",monospace;cursor:pointer;transition:all .15s;white-space:nowrap}
button:hover{background:#1a1a1a;color:#fff;border-color:#333}
button.on{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.3);color:#22C55E}
button.spd{background:#1a1a1a;color:#fff;border-color:#333}
.status{font-size:11px;color:#555;font-family:"DM Mono",monospace;min-height:16px;text-align:center}
.status.err{color:#ef4444}.status.ok{color:#22c55e}
.info{font-size:10px;color:#222;font-family:"DM Mono",monospace;letter-spacing:.5px}
</style>
</head>
<body>

<div class="player-wrap">
  <div id="player" style="width:100%;aspect-ratio:4/5;background:#07090F"></div>
</div>

<div class="controls">
  <button id="btnPlay">Play</button>
  <button id="btnStop">Stop</button>
  <button id="btnReplay">Replay</button>
</div>
<div class="controls">
  <button id="btn05">0.5x</button>
  <button id="btn1" class="spd">1x</button>
  <button id="btn2">2x</button>
</div>
<div class="controls">
  <button id="btnLive">Live Data</button>
  <button id="btnDummy">Dummy Data</button>
</div>

<div class="status" id="status">Loading...</div>
<div class="info">NIFTY 50 · market::day_chart · Pipeline v1</div>

<!-- Player engine -->
<script src="player-lite.js"></script>
<!-- Pipeline stack — order matters -->
<script src="data/field-schemas.js"></script>
<script src="data/mappers.js"></script>
<script src="data/fetchers/market-fetcher.js"></script>
<script src="data/pipeline.js"></script>

<script>
(async () => {
  const status  = document.getElementById("status");
  const playBtn = document.getElementById("btnPlay");
  let player = null;
  let schema = null;

  /* Load base template schema */
  status.textContent = "Loading template...";
  schema = await fetch("tpl-market-day-chart.json").then(r => r.json());

  /* Inject fonts and wait */
  CanvasPlayer.loadFonts(schema);
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 300));

  /* Init player with given source */
  async function init(source) {
    status.textContent = source === "market" ? "Fetching live data..." : "Loading dummy data...";
    status.className = "status";
    try {
      if (!player) {
        /* First load — use Pipeline.loadAndRender */
        player = new CanvasPlayer("#player", { playback:"manual" });
        await Pipeline.loadAndRender({ key:"market::day_chart", source, input:{ market:"NIFTY50" }, schema, player, isFirst:true });
        player.play();
        wireControls();
      } else {
        /* Already running — swap data only */
        await Pipeline.loadAndRender({ key:"market::day_chart", source, input:{ market:"NIFTY50" }, schema, player, isFirst:false });
      }
      status.textContent = source === "market" ? "Live data loaded" : "Dummy data loaded";
      status.className = "status ok";
      setTimeout(() => { status.textContent = ""; status.className = "status"; }, 2500);
    } catch(e) {
      status.textContent = "Error: " + e.message;
      status.className = "status err";
    }
  }

  function wireControls() {
    player.onStateChange(s => {
      playBtn.textContent = s.playing ? "Pause" : "Play";
      playBtn.classList.toggle("on", s.playing);
    });
    player.onEnded(() => { playBtn.textContent = "Replay"; playBtn.classList.remove("on"); });
    playBtn.addEventListener("click", () => player.toggle());
    document.getElementById("btnStop").addEventListener("click",   () => player.stop());
    document.getElementById("btnReplay").addEventListener("click", () => { player.stop(); player.play(); });
    document.getElementById("btn05").addEventListener("click", () => { player.setSpeed(0.5); setSpd("btn05"); });
    document.getElementById("btn1").addEventListener("click",  () => { player.setSpeed(1);   setSpd("btn1"); });
    document.getElementById("btn2").addEventListener("click",  () => { player.setSpeed(2);   setSpd("btn2"); });
    document.getElementById("btnLive").addEventListener("click",  () => init("market"));
    document.getElementById("btnDummy").addEventListener("click", () => init("dummy"));
    function setSpd(id) {
      ["btn05","btn1","btn2"].forEach(b => document.getElementById(b).classList.toggle("spd", b===id));
    }
  }

  /* Boot — try live first, fall back to dummy */
  try {
    await init("market");
  } catch {
    await init("dummy");
  }
})();
</script>
</body>
</html>
